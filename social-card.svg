<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rubik's Rubrics social card</title>
  <desc id="desc">Dark social graphic with the app title and two identical cube states rendered in different color schemes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070c"/>
      <stop offset="0.52" stop-color="#08111a"/>
      <stop offset="1" stop-color="#040509"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 300) rotate(130) scale(260 250)">
      <stop offset="0" stop-color="#4de36a" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#2ea043" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2ea043" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(740 306) rotate(130) scale(250 230)">
      <stop offset="0" stop-color="#6f7cff" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#6f7cff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6f7cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleFill" x1="120" y1="92" x2="678" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f9fc"/>
      <stop offset="0.55" stop-color="#d1d9e2"/>
      <stop offset="1" stop-color="#f6f9fc"/>
    </linearGradient>
    <linearGradient id="subtitleLine" x1="126" y1="292" x2="470" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#3fb950" stop-opacity="0.95"/>
      <stop offset="0.85" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="28" stdDeviation="20" flood-color="#000000" flood-opacity="0.52"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#3fb950" flood-opacity="0.12"/>
    </filter>
    <filter id="softBlur" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="54"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <linearGradient id="cubeTopGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7df189"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="cubeLeftGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#215c2e"/>
      <stop offset="1" stop-color="#12381d"/>
    </linearGradient>
    <linearGradient id="cubeRightGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#57db69"/>
      <stop offset="1" stop-color="#1f8c3f"/>
    </linearGradient>
    <linearGradient id="cubeTopClassic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dde4ea"/>
    </linearGradient>
    <linearGradient id="cubeLeftClassic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf5a"/>
      <stop offset="1" stop-color="#e4a100"/>
    </linearGradient>
    <linearGradient id="cubeRightClassic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7ef7"/>
      <stop offset="1" stop-color="#1d4fd8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="900" cy="292" rx="280" ry="210" fill="url(#greenGlow)" filter="url(#softBlur)"/>
  <ellipse cx="724" cy="318" rx="260" ry="170" fill="url(#blueGlow)" filter="url(#softBlur)"/>

  <g transform="translate(124 110)">
    <text x="0" y="0" fill="url(#titleFill)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="78" font-weight="800" letter-spacing="-2.8">Rubik's Rubrics</text>
    <text x="2" y="58" fill="#9aa4b2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">A cube, solved with style.</text>
    <rect x="0" y="103" width="392" height="1.6" rx="0.8" fill="url(#subtitleLine)"/>
    <text x="0" y="145" fill="#dbe2ea" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" opacity="0.92">Same state. Two skins.</text>
  </g>

  <g transform="translate(530 156)">
    <text x="0" y="0" fill="#9aa4b2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="1.4">GITHUB CONTRIBUTIONS COLORS</text>
    <g transform="translate(34 18) scale(0.77)" filter="url(#shadow)">
      <ellipse cx="162" cy="308" rx="142" ry="28" fill="#000" fill-opacity="0.42"/>
      <g transform="translate(0 2) rotate(-11 160 142)">
        <path d="M160 12L306 90L160 168L14 90L160 12Z" fill="url(#cubeTopGreen)"/>
        <path d="M14 90L160 168V344L14 266V90Z" fill="url(#cubeLeftGreen)"/>
        <path d="M306 90L160 168V344L306 266V90Z" fill="url(#cubeRightGreen)"/>
        <path d="M160 12L306 90L160 168L14 90L160 12Z" stroke="#dffff0" stroke-opacity="0.14" stroke-width="2"/>
        <path d="M160 168V344" stroke="#dffff0" stroke-opacity="0.08" stroke-width="2"/>
        <g opacity="0.95">
          <path d="M60 42L110 70L60 98L10 70L60 42Z" fill="#baf5c0"/>
          <path d="M110 70L160 98L110 126L60 98L110 70Z" fill="#57db69"/>
          <path d="M210 42L260 70L210 98L160 70L210 42Z" fill="#8af692"/>
          <path d="M260 70L310 98L260 126L210 98L260 70Z" fill="#2ea043"/>
          <path d="M60 166L110 194L60 222L10 194L60 166Z" fill="#0f3118"/>
          <path d="M110 194L160 222L110 250L60 222L110 194Z" fill="#6cdc79"/>
          <path d="M210 166L260 194L210 222L160 194L210 166Z" fill="#3e9d4d"/>
          <path d="M260 194L310 222L260 250L210 222L260 194Z" fill="#c1f7c8"/>
        </g>
        <circle cx="160" cy="190" r="6" fill="#baf5c0"/>
      </g>
    </g>
  </g>

  <g transform="translate(778 156)">
    <text x="0" y="0" fill="#9aa4b2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="1.4">CLASSIC COLORS</text>
    <g transform="translate(22 18) scale(0.77)" filter="url(#shadow)">
      <ellipse cx="162" cy="308" rx="142" ry="28" fill="#000" fill-opacity="0.42"/>
      <g transform="translate(0 2) rotate(-11 160 142)">
        <path d="M160 12L306 90L160 168L14 90L160 12Z" fill="url(#cubeTopClassic)"/>
        <path d="M14 90L160 168V344L14 266V90Z" fill="url(#cubeLeftClassic)"/>
        <path d="M306 90L160 168V344L306 266V90Z" fill="url(#cubeRightClassic)"/>
        <path d="M160 12L306 90L160 168L14 90L160 12Z" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
        <path d="M160 168V344" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
        <g opacity="0.95">
          <path d="M60 42L110 70L60 98L10 70L60 42Z" fill="#f8fbff"/>
          <path d="M110 70L160 98L110 126L60 98L110 70Z" fill="#ffcf5a"/>
          <path d="M210 42L260 70L210 98L160 70L210 42Z" fill="#d9e1ea"/>
          <path d="M260 70L310 98L260 126L210 98L260 70Z" fill="#2f7ef7"/>
          <path d="M60 166L110 194L60 222L10 194L60 166Z" fill="#f7b500"/>
          <path d="M110 194L160 222L110 250L60 222L110 194Z" fill="#dde4ea"/>
          <path d="M210 166L260 194L210 222L160 194L210 166Z" fill="#1d4fd8"/>
          <path d="M260 194L310 222L260 250L210 222L260 194Z" fill="#e65f4a"/>
        </g>
        <circle cx="160" cy="190" r="6" fill="#f8fbff"/>
      </g>
    </g>
  </g>

  <g transform="translate(540 496)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#0d141d" stroke="#3fb950" stroke-opacity="0.2"/>
    <text x="60" y="22" text-anchor="middle" fill="#dbe2ea" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="1.1">SAME STATE</text>
  </g>
</svg>
